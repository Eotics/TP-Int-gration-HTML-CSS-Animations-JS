<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philippe</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">PHILIPPE</div>
    <nav>
      <a href="#">Accueil</a>
      <a href="#projets">Projets</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <div class="hero">
    <h1 class="hero__title">Bienvenue sur Philippe</h1>
    <p class="hero__subtitle">Découvrez mes projets</p>
    <button class="btn btn--primary">▶ Voir</button>
  </div>

  <div id="projets" class="section">
    <h2>Mes projets</h2>
    <div class="grid">
      <div class="card">Projet 1</div>
      <div class="card">Projet 2</div>
      <div class="card">Projet 3</div>
      <div class="card">Projet 4</div>
      <div class="card">Projet 5</div>
    </div>
  </div>

  <section class="stats">
    <div class="stat">
      <span class="stat__number" data-target="5">0</span>
      <span class="stat__label">Projets</span>
    </div>
    <div class="stat">
      <span class="stat__number" data-target="3">0</span>
      <span class="stat__label">Langages</span>
    </div>
    <div class="stat">
      <span class="stat__number" data-target="100">0</span>
      <span class="stat__label">% Motivé</span>
    </div>
  </section>

  <div id="contact" class="section">
    <h2>Contact</h2>
    <p>philippe.viman@yahoo.com</p>
  </div>

  <footer>
    <p>© 2026 Philippe Viman</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
